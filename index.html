<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Call Console</title>
<style>
  :root {
    --bg: #F5F6F8;
    --surface: #FFFFFF;
    --ink: #15171E;
    --ink-soft: #5A606C;
    --ink-faint: #9AA0AC;
    --line: #E4E6EB;
    --line-strong: #D2D6DE;
    --accent: #1F45E0;
    --accent-soft: #EAEEFE;
    --gray: #6B7280;
    --amber: #C77400;
    --amber-soft: #FBF0DC;
    --green: #0C8F63;
    --green-deep: #056E4B;
    --green-soft: #E3F5EE;
    --red: #C02626;
    --red-soft: #FBE9E9;
    --radius: 14px;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
  }
  .wrap { max-width: 940px; margin: 0 auto; padding: 24px 18px 80px; }

  /* Header */
  header.top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
  .brand .tag { font-size: 13px; color: var(--ink-soft); }
  .banner { width: 100%; font-size: 12.5px; color: var(--amber); background: var(--amber-soft); border: 1px solid #EAD6AE; padding: 8px 12px; border-radius: 10px; margin-bottom: 14px; display: none; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 18px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px 14px; }
  .stat .n { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 11.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }
  .stat.hot .n { color: var(--amber); }
  .stat.hot { border-color: #EAD6AE; background: var(--amber-soft); }
  .stat.win .n { color: var(--green-deep); }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .search { flex: 1 1 200px; position: relative; }
  .search input { width: 100%; padding: 10px 12px 10px 34px; border: 1px solid var(--line-strong); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--surface); }
  .search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; stroke: var(--ink-faint); }
  .filters { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 3px; flex-wrap: wrap; }
  .filters button { border: none; background: transparent; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--ink-soft); padding: 6px 11px; border-radius: 7px; cursor: pointer; }
  .filters button.active { background: var(--ink); color: #fff; }
  .filters button .c { font-variant-numeric: tabular-nums; opacity: 0.7; margin-left: 4px; font-weight: 700; }
  select.sort { border: 1px solid var(--line-strong); border-radius: 10px; padding: 9px 10px; font-size: 13px; font-family: inherit; background: var(--surface); font-weight: 600; color: var(--ink); }

  .btn { border: 1px solid var(--line-strong); background: var(--surface); color: var(--ink); font-family: inherit; font-size: 13px; font-weight: 700; padding: 9px 13px; border-radius: 10px; cursor: pointer; white-space: nowrap; }
  .btn:hover { border-color: var(--ink-faint); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #1838BE; }

  /* Add panel */
  .addpanel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; display: none; }
  .addpanel.open { display: block; }
  .addgrid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 8px; }
  .addgrid input { padding: 9px 11px; border: 1px solid var(--line-strong); border-radius: 9px; font-size: 14px; font-family: inherit; }
  .addrow2 { display: flex; gap: 8px; margin-top: 8px; }
  .addrow2 input { flex: 1; padding: 9px 11px; border: 1px solid var(--line-strong); border-radius: 9px; font-size: 14px; font-family: inherit; }

  /* List */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-left: 4px solid var(--gray); border-radius: var(--radius); padding: 14px 16px; display: grid; grid-template-columns: 1fr auto; gap: 12px 16px; }
  .card .main { min-width: 0; }
  .card .name { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
  .card .meta { font-size: 12.5px; color: var(--ink-soft); margin-top: 1px; display: flex; gap: 8px; flex-wrap: wrap; }
  .card .meta .dot::before { content: "·"; margin-right: 8px; color: var(--ink-faint); }
  .phone { font-family: var(--mono); font-size: 15px; font-weight: 600; letter-spacing: 0.01em; margin-top: 8px; color: var(--ink); }
  .chip { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.03em; }
  .due-flag { font-size: 11.5px; font-weight: 700; color: var(--amber); }
  .due-flag.over { color: var(--red); }

  .controls { display: flex; flex-direction: column; gap: 7px; align-items: stretch; min-width: 172px; }
  .call-btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; background: var(--green); color: #fff; text-decoration: none; font-weight: 800; font-size: 14px; padding: 10px; border-radius: 10px; }
  .call-btn:hover { background: var(--green-deep); }
  .call-btn svg { width: 15px; height: 15px; }
  .row2 { display: flex; gap: 6px; }
  select.status, input.date { flex: 1; min-width: 0; padding: 7px 8px; border: 1px solid var(--line-strong); border-radius: 8px; font-size: 12.5px; font-family: inherit; background: var(--surface); color: var(--ink); }
  .notes { grid-column: 1 / -1; }
  textarea.notes-in { width: 100%; resize: vertical; min-height: 38px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 9px; font-size: 13px; font-family: inherit; color: var(--ink); background: #FCFCFD; }
  textarea.notes-in::placeholder { color: var(--ink-faint); }
  .del { align-self: flex-end; background: none; border: none; color: var(--ink-faint); font-size: 12px; font-weight: 600; cursor: pointer; padding: 2px; }
  .del:hover { color: var(--red); }

  /* Empty */
  .empty { text-align: center; padding: 54px 20px; color: var(--ink-soft); background: var(--surface); border: 1px dashed var(--line-strong); border-radius: var(--radius); }
  .empty h3 { color: var(--ink); font-size: 17px; margin: 0 0 6px; }
  .empty p { margin: 0 0 4px; font-size: 14px; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(20,22,28,0.45); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 520px; padding: 20px; max-height: 86vh; overflow: auto; }
  .modal h2 { margin: 0 0 4px; font-size: 19px; }
  .modal p.hint { margin: 0 0 12px; font-size: 13px; color: var(--ink-soft); }
  .modal textarea { width: 100%; min-height: 180px; border: 1px solid var(--line-strong); border-radius: 10px; padding: 11px; font-family: var(--mono); font-size: 12.5px; resize: vertical; }
  .filedrop { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; padding: 10px; border: 1.5px dashed var(--line-strong); border-radius: 10px; background: #FCFCFD; }
  .filedrop.over { border-color: var(--accent); background: var(--accent-soft); }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  .modal .result { font-size: 13px; color: var(--green-deep); margin-top: 8px; font-weight: 600; }

  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    .card { grid-template-columns: 1fr; }
    .controls { min-width: 0; }
    .addgrid { grid-template-columns: 1fr; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>Call Console</h1>
      <span class="tag">work the list, close the client</span>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn" id="importBtn">Import</button>
      <button class="btn" id="exportBtn">Export</button>
      <button class="btn primary" id="addBtn">+ Add lead</button>
    </div>
  </header>

  <div class="banner" id="banner">Couldn't connect to the shared list — check the Firebase config in the code, and your internet connection.</div>

  <div class="stats" id="stats"></div>

  <div class="addpanel" id="addPanel">
    <div class="addgrid">
      <input id="f_name" placeholder="Business name" />
      <input id="f_phone" placeholder="Phone" />
      <input id="f_cat" placeholder="Category (e.g. plumber)" />
    </div>
    <div class="addrow2">
      <input id="f_addr" placeholder="Address (optional)" />
      <button class="btn primary" id="saveLead">Add</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" placeholder="Search name or phone" />
    </div>
    <div class="filters" id="filters"></div>
    <select class="sort" id="sort">
      <option value="smart">Sort: Call next</option>
      <option value="name">Sort: Name</option>
      <option value="recent">Sort: Newest</option>
      <option value="calls">Sort: Most called</option>
    </select>
  </div>

  <div class="list" id="list"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
"use strict";

const KEY = "leads";

const STATUS = {
  new:            { label: "New",             color: "#1F45E0", group: "tocall" },
  no_answer:      { label: "No answer",       color: "#6B7280", group: "tocall" },
  voicemail:      { label: "Left voicemail",  color: "#6B7280", group: "tocall" },
  callback:       { label: "Callback",        color: "#C77400", group: "warm"   },
  interested:     { label: "Interested",      color: "#0C8F63", group: "warm"   },
  won:            { label: "Won",             color: "#056E4B", group: "won"    },
  not_interested: { label: "Not interested",  color: "#C02626", group: "dead"   },
  lost:           { label: "Lost",            color: "#C02626", group: "dead"   },
};

const FILTERS = [
  { id: "all",    label: "All" },
  { id: "tocall", label: "To call" },
  { id: "due",    label: "Due" },
  { id: "warm",   label: "Warm" },
  { id: "won",    label: "Won" },
];

let leads = [];
let filter = "all";
let sortBy = "smart";
let query = "";

/* ---------- helpers ---------- */
const $ = (s) => document.querySelector(s);
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function digits(s) { return (s || "").replace(/[^\d+]/g, ""); }
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function addDays(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function fmtWhen(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) + ", " +
         d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}
function esc(s) { return (s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function isDue(l) { return l.followUp && l.followUp <= todayStr() && STATUS[l.status].group !== "won" && STATUS[l.status].group !== "dead"; }

/* ---------- persistence (Firebase Firestore — shared with your teammate) ---------- */
// 1. Create a free project at https://console.firebase.google.com
// 2. Add a Firestore Database (Build > Firestore Database > Create).
// 3. Project settings > General > "Your apps" > Web app (</>) > copy the config below.
const firebaseConfig = {
  apiKey: "AIzaSyAgWFvOq7yUoCGeYL6QP3u8iPi6zuki75c",
  authDomain: "call-console-hosting.firebaseapp.com",
  projectId: "call-console-hosting",
  storageBucket: "call-console-hosting.firebasestorage.app",
  messagingSenderId: "606773619185",
  appId: "1:606773619185:web:5df52629bbcb643ccf7c50",
};
// The doc both of you read/write. Change "sharedLeads" if you want separate lists.
const DOC_PATH = ["callConsole", "sharedLeads"];

let fs = null;        // { doc, onSnapshot, setDoc }
let docRef = null;
let applyingRemote = false; // true while writing data that just came FROM the server, to avoid re-saving it

async function initFirebase() {
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const { getFirestore, doc, onSnapshot, setDoc } =
      await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    docRef = doc(db, DOC_PATH[0], DOC_PATH[1]);
    fs = { setDoc };

    onSnapshot(docRef, (snap) => {
      applyingRemote = true;
      leads = snap.exists() ? (snap.data().leads || []) : [];
      renderAll();
      applyingRemote = false;
    }, (err) => {
      console.error("Firestore listen failed", err);
      $("#banner").style.display = "block";
    });
  } catch (e) {
    console.error("Firebase init failed", e);
    $("#banner").style.display = "block";
  }
}

async function load() {
  await initFirebase();
}

let saveTimer = null;
function scheduleSave() {
  if (applyingRemote || !docRef || !fs) return; // don't echo back data we just received
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try { await fs.setDoc(docRef, { leads }); }
    catch (e) { console.error("save failed", e); }
  }, 350);
}

/* ---------- data ops ---------- */
function makeLead(o) {
  return {
    id: uid(),
    name: (o.name || "").trim() || "(unnamed)",
    phone: (o.phone || "").trim(),
    category: (o.category || "").trim(),
    address: (o.address || "").trim(),
    status: "new",
    notes: "",
    followUp: "",
    lastContact: null,
    callCount: 0,
    createdAt: new Date().toISOString(),
  };
}
function addLeads(items) {
  const have = new Set(leads.map((l) => digits(l.phone)).filter(Boolean));
  const haveNames = new Set(leads.map((l) => l.name.toLowerCase()));
  let added = 0;
  for (const it of items) {
    const d = digits(it.phone);
    if (d && have.has(d)) continue;
    if (!d && haveNames.has((it.name || "").toLowerCase())) continue;
    const lead = makeLead(it);
    leads.push(lead);
    if (d) have.add(d);
    haveNames.add(lead.name.toLowerCase());
    added++;
  }
  scheduleSave();
  return added;
}
function getLead(id) { return leads.find((l) => l.id === id); }

/* ---------- import parsers ---------- */
function parseImport(text) {
  text = text.trim();
  if (!text) return [];
  if (text[0] === "[" || text[0] === "{") {
    const data = tryParseJSON(text);
    if (!data) return [];
    const arr = Array.isArray(data) ? data : [data];
    return arr.map((o) => ({ name: o.name, phone: o.phone, category: o.category || o.type || "", address: o.address || "" }));
  }
  return parseCSV(text);
}
function tryParseJSON(text) {
  // Tolerate common paste artifacts: a trailing comma left over from copying
  // one entry out of a larger array, or a fragment missing its [ ] wrapper.
  const noTrailingComma = text.replace(/,\s*$/, "");
  const attempts = [text, noTrailingComma, `[${noTrailingComma}]`];
  for (const attempt of attempts) {
    try { return JSON.parse(attempt.replace(/,(\s*[}\]])/g, "$1")); }
    catch (e) { /* try next */ }
  }
  return null;
}
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter((l) => l.trim());
  if (!lines.length) return [];
  const header = splitCSVLine(lines[0]).map((h) => h.trim().toLowerCase());
  const idx = (names) => header.findIndex((h) => names.some((n) => h.includes(n)));
  const iName = idx(["name"]), iPhone = idx(["phone"]), iCat = idx(["category", "type"]), iAddr = idx(["address"]);
  const hasHeader = iName !== -1 || iPhone !== -1;
  const rows = hasHeader ? lines.slice(1) : lines;
  return rows.map((line) => {
    const c = splitCSVLine(line);
    if (!hasHeader) return { name: c[0] || "", phone: c[1] || "", category: c[2] || "", address: c[3] || "" };
    return { name: c[iName] || "", phone: iPhone > -1 ? c[iPhone] || "" : "", category: iCat > -1 ? c[iCat] || "" : "", address: iAddr > -1 ? c[iAddr] || "" : "" };
  }).filter((r) => r.name || r.phone);
}
function splitCSVLine(line) {
  const out = []; let cur = "", q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (q) {
      if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
      else if (ch === '"') q = false;
      else cur += ch;
    } else {
      if (ch === '"') q = true;
      else if (ch === ",") { out.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  out.push(cur);
  return out;
}

/* ---------- export ---------- */
function exportCSV() {
  const head = ["Name", "Phone", "Category", "Status", "Follow-up", "Last contact", "Calls", "Notes", "Address"];
  const esc2 = (v) => { const s = (v ?? "").toString(); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const rows = leads.map((l) => [l.name, l.phone, l.category, STATUS[l.status].label, l.followUp, fmtWhen(l.lastContact), l.callCount, l.notes, l.address].map(esc2).join(","));
  return [head.join(","), ...rows].join("\n");
}

/* ---------- render ---------- */
function visibleLeads() {
  let out = leads.filter((l) => {
    if (filter === "tocall" && STATUS[l.status].group !== "tocall") return false;
    if (filter === "warm" && STATUS[l.status].group !== "warm") return false;
    if (filter === "won" && STATUS[l.status].group !== "won") return false;
    if (filter === "due" && !isDue(l)) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!l.name.toLowerCase().includes(q) && !digits(l.phone).includes(digits(query))) return false;
    }
    return true;
  });
  const rank = (l) => {
    if (isDue(l)) return 0;
    const g = STATUS[l.status].group;
    return g === "tocall" ? 1 : g === "warm" ? 2 : g === "won" ? 3 : 4;
  };
  out.sort((a, b) => {
    if (sortBy === "name") return a.name.localeCompare(b.name);
    if (sortBy === "recent") return b.createdAt.localeCompare(a.createdAt);
    if (sortBy === "calls") return b.callCount - a.callCount;
    // smart
    const r = rank(a) - rank(b);
    if (r) return r;
    if (a.followUp && b.followUp) return a.followUp.localeCompare(b.followUp);
    if (a.followUp) return -1;
    if (b.followUp) return 1;
    return a.name.localeCompare(b.name);
  });
  return out;
}

function renderStats() {
  const g = (grp) => leads.filter((l) => STATUS[l.status].group === grp).length;
  const due = leads.filter(isDue).length;
  const data = [
    { n: leads.length, l: "Leads" },
    { n: g("tocall"), l: "To call" },
    { n: due, l: "Due today", cls: due ? "hot" : "" },
    { n: g("warm"), l: "Warm" },
    { n: g("won"), l: "Won", cls: "win" },
  ];
  $("#stats").innerHTML = data.map((s) => `<div class="stat ${s.cls || ""}"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join("");
}

function renderFilters() {
  const count = (id) => {
    if (id === "all") return leads.length;
    if (id === "due") return leads.filter(isDue).length;
    const map = { tocall: "tocall", warm: "warm", won: "won" };
    return leads.filter((l) => STATUS[l.status].group === map[id]).length;
  };
  $("#filters").innerHTML = FILTERS.map((f) =>
    `<button data-filter="${f.id}" class="${filter === f.id ? "active" : ""}">${f.label}<span class="c">${count(f.id)}</span></button>`
  ).join("");
}

function statusOptions(cur) {
  return Object.entries(STATUS).map(([k, v]) => `<option value="${k}" ${k === cur ? "selected" : ""}>${v.label}</option>`).join("");
}

function renderList() {
  const items = visibleLeads();
  const list = $("#list");
  if (!leads.length) {
    list.innerHTML = `<div class="empty"><h3>No leads yet</h3><p>Hit <b>+ Add lead</b> to enter one by hand,</p><p>or <b>Import</b> the leads.json / leads.csv from your finder script.</p></div>`;
    return;
  }
  if (!items.length) {
    list.innerHTML = `<div class="empty"><h3>Nothing here</h3><p>No leads match this filter or search.</p></div>`;
    return;
  }
  list.innerHTML = items.map((l) => {
    const st = STATUS[l.status];
    const meta = [l.category, l.address].filter(Boolean).map((x, i) => `<span class="${i ? "dot" : ""}">${esc(x)}</span>`).join("");
    const callInfo = l.callCount ? `<span class="dot">${l.callCount} call${l.callCount > 1 ? "s" : ""}</span>` +
      (l.lastContact ? `<span class="dot">last ${fmtWhen(l.lastContact)}</span>` : "") : "";
    let dueTxt = "";
    if (l.followUp && STATUS[l.status].group !== "won" && STATUS[l.status].group !== "dead") {
      const over = l.followUp < todayStr();
      const on = l.followUp === todayStr();
      if (over || on) dueTxt = `<span class="due-flag ${over ? "over" : ""}">${over ? "Overdue follow-up" : "Follow up today"}</span>`;
    }
    const tel = digits(l.phone);
    return `
      <div class="card" style="border-left-color:${st.color}">
        <div class="main">
          <div class="name">${esc(l.name)}</div>
          <div class="meta">${meta}${callInfo}</div>
          ${l.phone ? `<div class="phone">${esc(l.phone)}</div>` : `<div class="phone" style="color:var(--ink-faint)">no number</div>`}
          <div style="margin-top:6px; display:flex; gap:10px; align-items:center;">
            <span class="chip" style="color:${st.color};background:${st.color}14">${st.label}</span>
            ${dueTxt}
          </div>
        </div>
        <div class="controls">
          ${tel ? `<a class="call-btn" href="tel:${tel}" data-id="${l.id}" data-act="call"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8 9.6a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2z"/></svg>Call</a>`
                : `<button class="btn" disabled style="opacity:.5">No number</button>`}
          <div class="row2">
            <select class="status" data-id="${l.id}" data-field="status">${statusOptions(l.status)}</select>
          </div>
          <div class="row2">
            <input class="date" type="date" data-id="${l.id}" data-field="followUp" value="${l.followUp || ""}" title="Follow-up date" />
          </div>
          <button class="del" data-id="${l.id}" data-act="del">Delete</button>
        </div>
        <div class="notes">
          <textarea class="notes-in" data-id="${l.id}" data-field="notes" placeholder="Notes — what they said, objections, gatekeeper name...">${esc(l.notes)}</textarea>
        </div>
      </div>`;
  }).join("");
}

function renderAll() { renderStats(); renderFilters(); renderList(); }

/* ---------- events ---------- */
$("#addBtn").onclick = () => { $("#addPanel").classList.toggle("open"); $("#f_name").focus(); };
$("#saveLead").onclick = () => {
  const name = $("#f_name").value.trim(), phone = $("#f_phone").value.trim();
  if (!name && !phone) return;
  addLeads([{ name, phone, category: $("#f_cat").value.trim(), address: $("#f_addr").value.trim() }]);
  ["f_name", "f_phone", "f_cat", "f_addr"].forEach((id) => ($("#" + id).value = ""));
  $("#f_name").focus();
  renderAll();
};
["f_name", "f_phone", "f_cat", "f_addr"].forEach((id) =>
  $("#" + id).addEventListener("keydown", (e) => { if (e.key === "Enter") $("#saveLead").click(); }));

$("#search").addEventListener("input", (e) => { query = e.target.value; renderList(); });
$("#sort").addEventListener("change", (e) => { sortBy = e.target.value; renderList(); });
$("#filters").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-filter]"); if (!b) return;
  filter = b.dataset.filter; renderFilters(); renderList();
});

const list = $("#list");
list.addEventListener("click", (e) => {
  const el = e.target.closest("[data-act]"); if (!el) return;
  const l = getLead(el.dataset.id); if (!l) return;
  if (el.dataset.act === "call") {
    l.callCount++; l.lastContact = new Date().toISOString();
    if (l.status === "new") l.status = "no_answer"; // assume no-answer until they set outcome
    scheduleSave();
    setTimeout(renderAll, 60); // let tel: fire first
  } else if (el.dataset.act === "del") {
    leads = leads.filter((x) => x.id !== l.id); scheduleSave(); renderAll();
  }
});
list.addEventListener("change", (e) => {
  const el = e.target.closest("[data-field]"); if (!el) return;
  const l = getLead(el.dataset.id); if (!l) return;
  const field = el.dataset.field;
  if (field === "status") {
    l.status = el.value;
    if (l.status === "callback" && !l.followUp) l.followUp = addDays(3);
  } else if (field === "followUp") { l.followUp = el.value; }
  else if (field === "notes") { l.notes = el.value; }
  scheduleSave();
  if (field === "status") renderAll(); // status affects stats/filters/order
});

/* ---------- modal (import / export) ---------- */
function openModal(html) { $("#modal").innerHTML = html; $("#overlay").classList.add("open"); }
function closeModal() { $("#overlay").classList.remove("open"); }
$("#overlay").addEventListener("click", (e) => { if (e.target.id === "overlay") closeModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

$("#importBtn").onclick = () => {
  openModal(`
    <h2>Import leads</h2>
    <p class="hint">Adds to your existing list — it never replaces it, and duplicates by phone (or name, if no phone) are skipped automatically.</p>
    <div class="filedrop" id="fileDrop">
      <input type="file" id="importFile" accept=".json,.csv,text/csv,application/json,text/plain" multiple hidden />
      <button class="btn" id="chooseFile" type="button">Choose file(s)&hellip;</button>
      <span id="fileName" style="font-size:12.5px; color:var(--ink-soft); margin-left:8px;">or paste below, or drop file(s) here</span>
    </div>
    <textarea id="importText" placeholder='[ { "name": "...", "phone": "...", ... } ]  — or —  Name,Phone,Category,Address' style="margin-top:10px;"></textarea>
    <div class="result" id="importResult"></div>
    <div class="actions">
      <button class="btn" id="cancelImport">Cancel</button>
      <button class="btn primary" id="doImport">Import</button>
    </div>`);
  $("#cancelImport").onclick = closeModal;

  async function readFiles(files) {
    if (!files || !files.length) return;
    const texts = await Promise.all([...files].map((f) => f.text()));
    $("#fileName").textContent = [...files].map((f) => f.name).join(", ");
    if (texts.length === 1) {
      $("#importText").value = texts[0];
    } else {
      // Parse each file with its own header/format, then merge into one JSON array
      // so a mixed batch of CSVs/JSON files doesn't get mangled by naive concatenation.
      const merged = texts.flatMap(parseImport);
      $("#importText").value = JSON.stringify(merged, null, 2);
    }
  }
  $("#chooseFile").onclick = () => $("#importFile").click();
  $("#importFile").addEventListener("change", (e) => readFiles(e.target.files));
  const drop = $("#fileDrop");
  ["dragover", "dragenter"].forEach((ev) => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("over"); }));
  ["dragleave", "drop"].forEach((ev) => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("over"); }));
  drop.addEventListener("drop", (e) => readFiles(e.dataTransfer.files));

  $("#doImport").onclick = () => {
    const items = parseImport($("#importText").value);
    if (!items.length) { $("#importResult").style.color = "var(--red)"; $("#importResult").textContent = "Couldn't read that — check it's valid JSON or CSV."; return; }
    const added = addLeads(items);
    renderAll();
    $("#importResult").style.color = "var(--green-deep)";
    $("#importResult").textContent = `Added ${added} new lead${added === 1 ? "" : "s"} to your list of ${leads.length}` + (added < items.length ? ` (${items.length - added} were duplicates).` : ".");
    if (added) setTimeout(closeModal, 900);
  };
  setTimeout(() => $("#importText").focus(), 50);
};

$("#exportBtn").onclick = () => {
  const csv = exportCSV();
  openModal(`
    <h2>Export</h2>
    <p class="hint">Copy this to back up your list, or download it as a CSV to open in Sheets/Excel.</p>
    <textarea id="exportText" readonly>${esc(csv)}</textarea>
    <div class="actions">
      <button class="btn" id="copyExport">Copy</button>
      <button class="btn primary" id="dlExport">Download CSV</button>
    </div>`);
  $("#copyExport").onclick = () => {
    const ta = $("#exportText"); ta.select();
    try { document.execCommand("copy"); $("#copyExport").textContent = "Copied"; } catch (e) {}
  };
  $("#dlExport").onclick = () => {
    try {
      const blob = new Blob([csv], { type: "text/csv" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob); a.download = "leads.csv"; a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    } catch (e) { $("#copyExport").click(); }
  };
};

/* ---------- boot ---------- */
(async function () {
  await load();
  renderAll();
})();
</script>
</body>
</html>
